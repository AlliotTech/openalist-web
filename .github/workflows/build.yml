name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest]
    name: Build
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          path: alist-web
          persist-credentials: false
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: "alist-web/.node-version"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        id: pnpm-install
        with:
          version: 9.9.0
          run_install: false

      - name: Checkout dist repo
        uses: actions/checkout@v7
        with:
          repository: AlliotTech/web-dist
          ref: dev
          path: web-dist
          persist-credentials: false
          fetch-depth: 0

      - name: Build
        run: |
          cd alist-web
          pnpm install --frozen-lockfile
          pnpm i18n:build
          pnpm build
          cd ..
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Commit dist
        run: |
          cd web-dist
          rm -rf dist
          cp -r ../alist-web/dist .
          git add .
          git config --local user.email "24980252+AlliotTech@users.noreply.github.com"
          git config --local user.name "AlliotTech"
          git commit --amend -m "upload dev dist"
          cd ..

      - name: Upload dist files
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c
        with:
          github_token: ${{ secrets.MY_TOKEN }}
          branch: dev
          directory: web-dist
          repository: AlliotTech/web-dist
          force: true
